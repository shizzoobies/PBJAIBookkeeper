name = "ai-bookkeeper"
main = "worker/src/index.ts"
compatibility_date = "2025-06-01"

# Non-secret config. Secrets (QBO_CLIENT_ID/SECRET, TOKEN_ENC_KEY, etc.) are set
# with `wrangler secret put` and never committed. See .dev.vars.example for local dev.
[vars]
QBO_ENVIRONMENT = "sandbox"
# Cron refreshes any access token expiring within this many seconds.
REFRESH_WINDOW_SECONDS = "3600"
# Dashboard (Pages) origin. Scopes CORS and is the OAuth callback redirect target.
# The BFF shared secret is a Worker *secret* (`wrangler secret put BFF_SHARED_SECRET`),
# never committed here.
DASHBOARD_URL = "https://ai-bookkeeper-dashboard.pages.dev"
# Enables QBO write-back (receipt/bill capture → Bill/Purchase). ON for the sandbox
# test; keep OFF (unset) for production until Phase 2 sign-off.
WRITEBACK_ENABLED = "true"

[[d1_databases]]
binding = "DB"
database_name = "ai-bookkeeper"
database_id = "e8fc1ba9-d795-4ed0-90f6-aaf65785508d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "COA_CACHE"
id = "18ef94df3f5f4a2c87528cc80ba8b633"

# Hourly token-refresh sweep (keeps access tokens fresh and the refresh token alive).
[triggers]
crons = ["0 * * * *"]

